  --heading-font:'Playfair Display',serif;
}
body.theme-pastel2 #starfield{opacity:1;filter:hue-rotate(-80deg) brightness(0.6);}
body.theme-pastel2::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 70% 10%,rgba(180,160,240,.30) 0%,transparent 45%),
    radial-gradient(ellipse at 20% 85%,rgba(160,140,220,.20) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,rgba(245,242,255,.5) 0%,transparent 65%);
}

/* ── THEME: Pastell Mint · Morgentau ───────────────── */
body.theme-pastel3{
  --bg:#eef8f4;--surface:#f5fdf9;--surface2:#e4f4ee;
  --border:#b8dece;--accent:#2a9068;--accent2:#1a7050;
  --warm:#b06820;--red:#c03040;--text:#0e2820;--muted:#5a8878;--muted2:#90c0b0;
  --heading-font:'Nunito',sans-serif;
}
body.theme-pastel3 #starfield{opacity:1;filter:hue-rotate(-80deg) brightness(0.6);}
body.theme-pastel3::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 15% 15%,rgba(160,220,195,.30) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 75%,rgba(130,200,170,.20) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,rgba(235,250,244,.5) 0%,transparent 65%);
}


body{
  background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:40px 18px 80px;position:relative;overflow-x:hidden;transition:background .3s,color .3s;
}
body::before{content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:500px;height:400px;background:radial-gradient(ellipse,rgba(95,217,138,.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
body.theme-pastel1::before,body.theme-pastel2::before,body.theme-pastel3::before{top:0;left:0;transform:none;width:100%;height:100%;}
.container{width:100%;max-width:430px;position:relative;z-index:1;}
.theme-btn{position:fixed;top:14px;right:14px;z-index:400;width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;opacity:.55;transition:all .2s;}
.theme-btn:hover{opacity:1;border-color:rgba(95,217,138,.4);}

/* HEADER */
.header{text-align:center;margin-bottom:32px;opacity:0;transform:translateY(-16px);animation:fadeDown .7s ease forwards;}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:18px;background:transparent;border:1px solid transparent,138,.2);margin:0 auto 16px;cursor:pointer;transition:transform .15s,box-shadow .2s;}
.logo-mark:hover{transform:scale(1.08);box-shadow:0 0 18px rgba(95,217,138,.25);}
.logo-mark:active{transform:scale(.95);}
.title{font-family:'Syne',sans-serif;font-size:clamp(52px,15vw,80px);font-weight:800;letter-spacing:-0.01em;line-height:1;color:var(--text);}
.title em{color:var(--text);font-style:normal;}
.subtitle{margin-top:10px;font-size:12px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;}

/* USER CHIP */
.user-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(95,217,138,.07);border:1px solid rgba(95,217,138,.15);border-radius:100px;padding:5px 12px 5px 8px;margin-bottom:6px;cursor:pointer;transition:border-color .2s,background .2s;}
.user-chip:hover{border-color:rgba(95,217,138,.3);background:rgba(95,217,138,.12);}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#5fd98a,#3ab86a);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0e1210;font-family:'Syne',sans-serif;}
.user-name{font-size:12px;font-weight:600;color:var(--accent2);font-family:'Syne',sans-serif;letter-spacing:.04em;}
.user-change{font-size:10px;color:var(--muted);margin-left:2px;}






/* DIVIDER */
.sdiv{display:flex;align-items:center;gap:10px;margin-bottom:14px;opacity:0;transform:translateY(14px);animation:fadeUp .6s .15s ease forwards;}
.sdiv::before,.sdiv::after{content:'';flex:1;height:1px;background:var(--border);}
.sdiv span{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted2);}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:10px;}
.cards>*{opacity:0;transform:translateY(14px);animation:fadeUp .5s ease forwards;}
.cards>*:nth-child(1){animation-delay:.12s}.cards>*:nth-child(2){animation-delay:.20s}
.cards>*:nth-child(3){animation-delay:.28s}.cards>*:nth-child(4){animation-delay:.36s}
.cards>*:nth-child(5){animation-delay:.44s}.cards>*:nth-child(6){animation-delay:.52s}

/* LINK CARD */
.lcard{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--surface);border:1px solid var(--border);border-radius:16px;text-decoration:none;color:var(--text);transition:border-color .2s,transform .15s,background .2s;position:relative;overflow:hidden;}
.lcard:hover{border-color:rgba(95,217,138,.3);transform:translateY(-2px);background:var(--surface2);}
.lcard:active{transform:scale(.98);}
.carrow{color:var(--muted2);font-size:13px;transition:color .2s,transform .2s;margin-left:auto;flex-shrink:0;}
.lcard:hover .carrow{color:var(--accent);transform:translateX(3px);}

/* EXPAND CARD */
.xcard{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .25s,box-shadow .25s;}
body.light .xcard{box-shadow:0 2px 16px rgba(30,100,60,.08);}
.xcard.open{border-color:rgba(95,217,138,.22);box-shadow:0 4px 24px rgba(95,217,138,.05);}
.xhead{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;user-select:none;transition:background .15s;}
.xhead:hover{background:rgba(255,255,255,.02);}
.xchev{color:var(--muted2);font-size:14px;flex-shrink:0;margin-left:auto;transition:transform .28s,color .2s;}
.xcard.open .xchev{transform:rotate(90deg);color:var(--accent);}
.xbody{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1);padding:0 18px;}
.xcard.open .xbody{max-height:5000px;padding:0 18px 18px;}
.cicon{width:40px;height:40px;border-radius:11px;background:rgba(95,217,138,.08);border:1px solid rgba(95,217,138,.13);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.clabel{font-size:14.5px;font-weight:600;font-family:'Syne',sans-serif;}
.cdesc{font-size:11.5px;color:var(--muted);margin-top:2px;}
.prog-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:3px;}
.prog-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;max-width:80px;}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.prog-label{font-size:10px;color:var(--accent);font-weight:600;}

/* INNER */
.idiv{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
.idiv::after{content:'';flex:1;height:1px;background:rgba(95,217,138,.1);}
.irow{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.irow:last-child{border-bottom:none;}
.ikey{font-size:10.5px;color:var(--muted);min-width:76px;padding-top:3px;flex-shrink:0;}
.ival{flex:1;font-size:13px;line-height:1.5;color:var(--text);}
.editable{background:rgba(95,217,138,.05);border:1px solid rgba(95,217,138,.12);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;width:100%;line-height:1.5;outline:none;transition:border-color .2s;resize:none;}
.editable:focus{border-color:rgba(95,217,138,.4);background:rgba(95,217,138,.09);}
input[type="date"].editable{cursor:pointer;color-scheme:dark;max-width:180px;}
input[type="date"].editable::-webkit-calendar-picker-indicator{filter:invert(.4) sepia(1) saturate(4) hue-rotate(90deg);cursor:pointer;}

/* UPLOAD */
.uzone{border:1.5px dashed rgba(95,217,138,.2);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-top:10px;position:relative;}
.uzone:hover,.uzone.drag{border-color:rgba(95,217,138,.5);background:rgba(95,217,138,.04);}
.uzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.uzone-icon{font-size:26px;margin-bottom:6px;}
.uzone-title{font-size:13px;font-weight:500;color:var(--accent2);}
.uzone-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.flist{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
.fitem{display:flex;align-items:center;gap:10px;background:rgba(95,217,138,.06);border:1px solid rgba(95,217,138,.12);border-radius:8px;padding:8px 12px;}
.fname{flex:1;font-size:12px;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fsize{font-size:10.5px;color:var(--muted);}
.fdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;transition:color .15s;}
.fdel:hover{color:var(--red);}
.sbtn{display:none;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:11px;padding:11px;background:linear-gradient(135deg,rgba(95,217,138,.18),rgba(95,217,138,.08));border:1px solid rgba(95,217,138,.28);border-radius:10px;color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.sbtn:hover{background:rgba(95,217,138,.24);transform:translateY(-1px);}
.snote{display:none;font-size:10.5px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.5;}
.plink-box{background:rgba(95,217,138,.05);border:1px solid rgba(95,217,138,.12);border-radius:10px;padding:10px 12px;margin-top:14px;display:flex;align-items:center;gap:8px;}
.plink-copy{background:none;border:1px solid var(--muted2);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 8px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Inter',sans-serif;}
.plink-copy:hover{border-color:var(--accent);color:var(--accent);}

/* CAL BUTTON */
.cal-btn{background:none;border:1px solid var(--muted2);border-radius:7px;color:var(--muted);font-size:11px;padding:3px 7px;cursor:pointer;flex-shrink:0;margin-left:4px;white-space:nowrap;transition:border-color .2s,color .2s,background .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;}
.cal-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(95,217,138,.07);}

/* TIMELINE (Termine) */
.tl{display:flex;flex-direction:column;}
.tlrow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:center;}
.tlrow:last-child{border-bottom:none;}
.tldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--accent);}
.tldot.u{background:var(--red);}
.tlinfo{flex:1;min-width:0;}
.tldate{font-size:11px;font-weight:500;color:var(--accent);}
.tldate.u{color:var(--red);}
.tltitle{font-size:13px;font-weight:500;line-height:1.3;}
.tlsub{font-size:11px;color:var(--muted);margin-top:1px;}
.tlcountdown{font-size:10px;font-weight:600;color:var(--warm);margin-top:2px;font-family:'Syne',sans-serif;}
.tlcountdown.urgent{color:var(--red);}
.tlcountdown.past{color:var(--muted2);font-weight:400;}

/* STUNDENPLAN */
.sp-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;}
.sp-nav-btn{width:34px;height:34px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);transition:all .18s;flex-shrink:0;user-select:none;}
.sp-nav-btn:hover{border-color:rgba(95,217,138,.4);color:var(--accent);}
.sp-nav-btn:disabled,.sp-nav-btn.disabled{opacity:.25;pointer-events:none;}
.sp-nav-center{flex:1;text-align:center;}
.sp-nav-week{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);line-height:1.2;}
.sp-nav-range{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.04em;}
.sp-nav-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--border);margin:6px 2px 0;cursor:pointer;transition:background .15s;}
.sp-nav-dot.cur{background:var(--accent);}
.sp-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.sp-tabs::-webkit-scrollbar{display:none;}
.sp-fbtn{background:none;border:1px solid var(--border);border-radius:100px;color:var(--muted);font-size:11px;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.sp-fbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(95,217,138,.08);}
.sp-week{margin-bottom:6px;}
.sp-week-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.sp-week-label::after{content:'';flex:1;height:1px;background:rgba(95,217,138,.08);}
.sp-day{display:flex;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:4px;background:var(--surface2);border:1px solid var(--border);transition:border-color .15s,transform .15s;}
.sp-day.today{border-color:rgba(95,217,138,.35);background:rgba(95,217,138,.06);}
.sp-day.peer{border-color:rgba(240,201,110,.25);background:rgba(240,201,110,.04);}
.sp-day.frei{opacity:.38;}
.sp-day.pruef{border-color:rgba(232,97,77,.3);background:rgba(232,97,77,.04);}
.sp-date-col{min-width:42px;flex-shrink:0;}
.sp-day-name{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.sp-day-num{font-size:17px;font-weight:800;font-family:'Syne',sans-serif;line-height:1.1;}
.sp-day.today .sp-day-num{color:var(--accent);}
.sp-content{flex:1;min-width:0;}
.sp-time{font-size:10px;color:var(--muted);margin-bottom:2px;}
.sp-lesson{font-size:12.5px;font-weight:500;line-height:1.3;margin-bottom:1px;}
.sp-ref{font-size:11px;color:var(--muted);}
.sp-multi{display:flex;flex-direction:column;gap:4px;}
.sp-multi-item{padding:4px 8px;background:rgba(95,217,138,.04);border-left:2px solid rgba(95,217,138,.2);border-radius:0 5px 5px 0;}
.sp-peer-tag{display:inline-block;font-size:10px;color:var(--warm);background:rgba(240,201,110,.1);border:1px solid rgba(240,201,110,.2);border-radius:100px;padding:1px 7px;margin-top:2px;}
.sp-search{width:100%;background:rgba(95,217,138,.05);border:1px solid rgba(95,217,138,.12);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;margin-bottom:12px;transition:border-color .2s;}
.sp-search:focus{border-color:rgba(95,217,138,.4);}
.sp-search::placeholder{color:var(--muted2);}
.sp-empty{font-size:13px;color:var(--muted);text-align:center;padding:20px;font-style:italic;}

/* ACCESS REQUEST */
.access-card{border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--surface);}
.access-locked{display:flex;flex-direction:column;align-items:center;padding:28px 20px;gap:8px;text-align:center;}
.access-lock-icon{font-size:36px;margin-bottom:4px;filter:grayscale(.4);}
.access-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);}
.access-sub{font-size:12px;color:var(--muted);line-height:1.5;max-width:260px;}
.access-btn{margin-top:10px;padding:10px 22px;background:var(--accent);color:#0e1210;border:none;border-radius:100px;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:opacity .2s;}
.access-btn:hover{opacity:.85;}
.access-form{padding:20px;border-top:1px solid var(--border);display:none;flex-direction:column;gap:10px;}
.access-form.open{display:flex;}
.access-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.access-input:focus{border-color:rgba(95,217,138,.4);}
.access-send-btn{padding:10px;background:rgba(95,217,138,.12);border:1px solid rgba(95,217,138,.25);border-radius:10px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;}
.access-send-btn:hover{background:rgba(95,217,138,.2);}
.access-code-row{display:flex;gap:8px;align-items:center;}
.access-code-input{flex:1;letter-spacing:.15em;font-size:15px;font-weight:700;text-align:center;text-transform:uppercase;}
.access-divider{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.access-divider::before,.access-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.access-unlocked{display:flex;flex-direction:column;gap:10px;padding:16px;}
.access-file-btn{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);transition:border-color .18s,background .18s;}
.access-file-btn:hover{border-color:rgba(95,217,138,.35);background:rgba(95,217,138,.04);}
.access-file-icon{font-size:20px;flex-shrink:0;}
.access-file-info{flex:1;min-width:0;}
.access-file-name{font-size:13px;font-weight:600;}
.access-file-desc{font-size:11px;color:var(--muted);margin-top:1px;}
/* admin request badge */
.req-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:100px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:0 4px;margin-left:6px;}
.req-item{padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
.req-item-name{font-weight:700;font-size:13px;color:var(--text);}
.req-item-email{font-size:11px;color:var(--muted);margin-top:2px;}
.req-item-time{font-size:10px;color:var(--muted2);margin-top:1px;}
.req-code-box{margin-top:10px;padding:10px 14px;background:rgba(95,217,138,.08);border:1px solid rgba(95,217,138,.2);border-radius:8px;display:none;}
.req-code-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);letter-spacing:.18em;}
.req-actions{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.req-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;}
.req-btn-gen{background:rgba(95,217,138,.1);border-color:rgba(95,217,138,.3);color:var(--accent);}
.req-btn-mail{background:rgba(100,180,230,.1);border-color:rgba(100,180,230,.3);color:#64b4e6;}
.req-btn-del{background:rgba(232,97,77,.08);border-color:rgba(232,97,77,.25);color:var(--red);}
.sp-slide{animation:spSlideIn .22s ease both;}
@keyframes spSlideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.sp-slide-back{animation:spSlideBack .22s ease both;}
@keyframes spSlideBack{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

/* TASKS */
.tsec{margin-top:12px;}.tsec:first-child{margin-top:0;}
.tglabel{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:7px;}
.titem{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.titem:last-child{border-bottom:none;}
.tcheck{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--muted2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:background .15s,border-color .15s;}
.tcheck.done{background:var(--accent);border-color:var(--accent);color:#0e1210;}
.tlabel{font-size:13px;line-height:1.35;}
.tdue{font-size:11px;color:var(--muted);margin-top:2px;}

/* PEER GROUPS */
.pgroup{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;transition:border-color .2s;}
.pgroup.mine{border-color:rgba(95,217,138,.3);background:rgba(95,217,138,.04);}
.pgroup-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pgroup-num{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:'Syne',sans-serif;color:#0e1210;}


.pgroup-title{font-size:13px;font-weight:600;font-family:'Syne',sans-serif;flex:1;}
